<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Explorer</title>
    <link rel="stylesheet" href="styles.css?v=9">
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <svg class="brand-icon" viewBox="0 0 24 24" width="24" height="24">
                <polygon points="12,2 22,8.5 22,20 12,22 2,20 2,8.5" fill="none" stroke="#3498db" stroke-width="2"/>
                <polygon points="12,6 18,10 18,17 12,18.5 6,17 6,10" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
            </svg>
            <span class="brand-title">Fractal Explorer</span>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <div class="row">
                <div class="control-group">
                    <label>Fractal Type</label>
                    <select id="fractal_type">
                        <option value="mandelbrot">Mandelbrot</option>
                        <option value="julia">Julia</option>
                        <option value="exponential">Exponential</option>
                        <option value="sine">Sine</option>
                        <option value="cosine">Cosine</option>
                        <option value="newton">Newton</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Colormap</label>
                    <select id="colormap">
                        <option value="Blues">Blues</option>
                        <option value="Cividis">Cividis</option>
                        <option value="Greys">Greys</option>
                        <option value="Inferno">Inferno</option>
                        <option value="Magma">Magma</option>
                        <option value="Plasma">Plasma</option>
                        <option value="Turbo" selected>Turbo</option>
                        <option value="Viridis">Viridis</option>
                        <option value="YlGnBu">YlGnBu</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Reverse</label>
                    <input type="checkbox" id="reverse_colormap" style="width: 20px; height: 20px; margin-bottom: 8px;">
                </div>

                <div class="control-group">
                    <label>Max Iterations</label>
                    <input type="number" id="iterations" value="200" step="100" style="width: 100px;">
                </div>

                <div class="control-group">
                    <label>Resolution (px)</label>
                    <input type="number" id="resolution" value="1600" step="100" min="400" style="width: 100px;">
                </div>

                <div class="control-group">
                    <label>Zoom Factor</label>
                    <input type="number" id="zoomFactor" value="10" step="0.5" min="1.1" style="width: 80px;">
                </div>
            </div>

            <div id="c-params" class="row" style="display:none;">
                <div class="control-group">
                    <label>Constant C (Real)</label>
                    <input type="number" id="c_real" value="-0.7" step="0.00001">
                </div>
                <div class="control-group">
                    <label>Constant C (Imag)</label>
                    <input type="number" id="c_imag" value="0.27" step="0.00001">
                </div>
            </div>

            <div id="newton-params" class="row" style="display:none;">
                <div class="control-group">
                    <label>Newton Power (p)</label>
                    <input type="number" id="power" value="3.0" step="0.1">
                </div>
            </div>

            <div class="row">
                <button id="resetBtn" class="secondary">Reset View</button>
            </div>

            <div class="row" style="border-top: 1px solid #333; padding-top: 20px; margin-top: 10px;">
                <div class="control-group" style="flex-grow: 1;">
                    <label>Save Filename (in images/)</label>
                    <input type="text" id="saveFilename" placeholder="filename.jpg" style="width: 100%;">
                </div>
                <button id="saveBtn" class="secondary">Save Image</button>
            </div>
            <div id="saveStatus" style="font-size: 0.8rem; margin-top: -10px; min-height: 1.2em; color: #3498db;"></div>
            
            <div class="row" style="margin-top: 10px; font-size: 0.85rem; color: #888;">
                <div id="precision-info">
                    Precision: <span id="precision-val">10<sup>0</sup></span> 
                    <span id="precision-warning" style="color: #e74c3c; display: none; margin-left: 10px;">⚠️ Precision Limit Reached</span>
                </div>
            </div>
        </div>

        <div class="viewer">
            <div id="loader" class="loader">Rendering...</div>
            <div id="hover-coords" class="hover-coords"></div>
            <img id="fractalImg" src="" alt="Fractal Image">
        </div>
    </div>

    <script src="script.js?v=9"></script>
</body>
</html>
