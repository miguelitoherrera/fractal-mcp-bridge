[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fractal-mcp-bridge"
version = "0.1.0"
dependencies = [
    "fastmcp",
    "numpy",
    "numba",
    "google-cloud-bigquery"
]

[tool.setuptools.package-dir]
# This tells Python (for example) that the "fractal_core" package is inside the "lib" folder
fractal_core = "lib/fractal_core"
bridge = "src/bridge"
utils = "lib/utils"