<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Interactive Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Fractal Explorer</h1>
    
    <div class="container">
        <div class="controls">
            <div class="row">
                <div class="control-group">
                    <label>Fractal Type</label>
                    <select id="type">
                        <option value="mandelbrot">Mandelbrot</option>
                        <option value="julia">Julia</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Colormap</label>
                    <select id="colormap">
                        <option value="Blues">Blues</option>
                        <option value="Cividis">Cividis</option>
                        <option value="Greys">Greys</option>
                        <option value="Inferno">Inferno</option>
                        <option value="Magma">Magma</option>
                        <option value="Plasma">Plasma</option>
                        <option value="Turbo" selected>Turbo</option>
                        <option value="Viridis">Viridis</option>
                        <option value="YlGnBu">YlGnBu</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Reverse</label>
                    <input type="checkbox" id="reverse_colormap" style="width: 20px; height: 20px; margin-bottom: 8px;">
                </div>
                
                <div class="control-group">
                    <label>Max Iterations</label>
                    <input type="number" id="iterations" value="200" step="100" style="width: 100px;">
                </div>

                <div class="control-group">
                    <label>Resolution (px)</label>
                    <input type="number" id="resolution" value="1600" step="100" min="400" style="width: 100px;">
                </div>

                <div class="control-group">
                    <label>Zoom Factor</label>
                    <input type="number" id="zoomFactor" value="10" step="0.5" min="1.1" style="width: 80px;">
                </div>
            </div>

            <div id="julia-params" class="row" style="display:none;">
                <div class="control-group">
                    <label>Julia C (Real)</label>
                    <input type="number" id="c_real" value="-0.74543" step="0.00001">
                </div>
                <div class="control-group">
                    <label>Julia C (Imag)</label>
                    <input type="number" id="c_imag" value="0.11301" step="0.00001">
                </div>
            </div>

            <div class="row">
                <button id="updateBtn">Update / Render</button>
                <button id="resetBtn" class="secondary">Reset View</button>
            </div>
        </div>

        <div class="viewer">
            <div id="coordsDisplay" class="coords">Range: X[-2, 1], Y[-1.5, 1.5]</div>
            <div id="loader" class="loader">Rendering...</div>
            <img id="fractalImg" src="" alt="Fractal Image">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
